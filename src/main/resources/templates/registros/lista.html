<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Veterinaria - Registros Médicos</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>

<h1>Registros Médicos</h1>

<div class="nav-buttons">
    <a th:href="@{/registros-medicos/nuevo}">
        <button>Crear Nuevo Registro</button>
    </a>
    <form th:action="@{/home}">
        <button>Regresar al Inicio</button>
    </form>
</div>

<h2>Lista de Registros</h2>

<div th:if="${registros.isEmpty()}" class="message">
    <p>No hay registros médicos disponibles.</p>
</div>

<table th:unless="${registros.isEmpty()}">
    <tr>
        <th>ID</th>
        <th>Paciente</th>
        <th>Veterinario</th>
        <th>Fecha de Registro</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="registro : ${registros}">
        <td th:text="${registro.id}"></td>
        <td th:text="${registro.paciente.nombre}"></td>
        <td th:text="${registro.veterinarioResponsable}"></td>
        <td th:text="${#temporals.format(registro.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
        <td>
            <a th:href="@{/registros-medicos/{id}(id=${registro.id})}">
                <button>Ver Detalles</button>
            </a>
            <a th:href="@{/registros-medicos/{id}/editar(id=${registro.id})}">
                <button>Editar</button>
            </a>
        </td>
    </tr>
</table>

</body>
</html>
