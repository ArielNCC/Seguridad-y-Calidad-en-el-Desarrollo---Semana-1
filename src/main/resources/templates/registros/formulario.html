<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Veterinaria - Nuevo Registro Médico</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>

<h1>Crear Nuevo Registro Médico</h1>

<form th:action="@{/registros-medicos}" method="post">
    <label>Paciente:</label>
    <select name="paciente.id" required>
        <option value="">-- Seleccionar Paciente --</option>
        <option th:each="paciente : ${pacientes}" 
                th:value="${paciente.id}"
                th:text="${paciente.nombre + ' (' + paciente.especie + ')'}">
        </option>
    </select>

    <label>Veterinario Responsable:</label>
    <input type="text" name="veterinarioResponsable" required placeholder="Nombre del veterinario">

    <button type="submit">Crear Registro</button>
</form>

<div class="nav-buttons">
    <form th:action="@{/registros-medicos}">
        <button>Cancelar</button>
    </form>
</div>

</body>
</html>
