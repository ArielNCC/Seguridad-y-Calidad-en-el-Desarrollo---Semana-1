<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Veterinaria - Detalles Factura</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>

<h1>Detalles de Factura</h1>

<div class="factura-container">
    <div class="factura-header">
        <h2>Factura #<span th:text="${factura.id}"></span></h2>
        <p th:if="${factura.paciente}">
            <strong>Paciente:</strong> <span th:text="${factura.paciente.nombre}"></span>
        </p>
    </div>

    <div class="factura-desglose">
        <h3>Descripción de Servicios</h3>
        <p th:text="${factura.descripcion}" class="descripcion-completa"></p>
    </div>

    <div class="factura-total">
        <h3>Resumen</h3>
        <p class="total-line">
            <strong>Total a Pagar:</strong> 
            <span class="total-amount" th:text="'$' + ${#numbers.formatDecimal(factura.costo, 1, 2)}"></span>
        </p>
    </div>

    <div class="nav-buttons">
        <form th:action="@{/facturas}">
            <button>Regresar</button>
        </form>
    </div>
</div>

<!-- Agregar Cargos -->
<section class="add-charges">
    <h3>Agregar Cargos Adicionales</h3>

    <div class="charge-form-container">
        <!-- Cargo de Medicamento -->
        <form th:action="@{/facturas/{id}/medicamento(id=${factura.id})}" method="post" class="charge-form">
            <h4>Agregar Costo de Medicamento</h4>
            <label>Costo de Medicamento:</label>
            <input type="number" name="costo" required min="0" step="0.01" placeholder="0.00">
            <button type="submit">Agregar Medicamento</button>
        </form>

        <!-- Cargo de Tratamiento -->
        <form th:action="@{/facturas/{id}/tratamiento(id=${factura.id})}" method="post" class="charge-form">
            <h4>Agregar Costo de Tratamiento</h4>
            <label>Costo de Tratamiento:</label>
            <input type="number" name="costo" required min="0" step="0.01" placeholder="0.00">
            <button type="submit">Agregar Tratamiento</button>
        </form>

        <!-- Cargo de Servicio -->
        <form th:action="@{/facturas/{id}/servicio(id=${factura.id})}" method="post" class="charge-form">
            <h4>Agregar Servicio Adicional</h4>
            <label>Tipo de Servicio:</label>
            <input type="text" name="tipoServicio" required placeholder="ej: Radiografía, Análisis de sangre">
            
            <label>Costo del Servicio:</label>
            <input type="number" name="costo" required min="0" step="0.01" placeholder="0.00">
            
            <button type="submit">Agregar Servicio</button>
        </form>
    </div>
</section>

<!-- Opciones de Eliminación -->
<div class="danger-zone">
    <h3>Opciones Avanzadas</h3>
    <form th:action="@{/facturas/{id}/eliminar(id=${factura.id})}" method="post" onsubmit="return confirm('¿Estás seguro de que deseas eliminar esta factura?');">
        <button type="submit" class="danger-btn">Eliminar Factura</button>
    </form>
</div>

</body>
</html>
