<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Veterinaria - Facturas</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>

<h1>Gestión de Facturas</h1>

<div class="nav-buttons">
    <a th:href="@{/facturas/nueva}">
        <button>Crear Nueva Factura</button>
    </a>
    <form th:action="@{/home}">
        <button>Regresar al Inicio</button>
    </form>
</div>

<h2>Lista de Facturas</h2>

<div th:if="${facturas.isEmpty()}" class="message">
    <p>No hay facturas disponibles.</p>
</div>

<table th:unless="${facturas.isEmpty()}">
    <tr>
        <th>ID</th>
        <th>Paciente</th>
        <th>Descripción</th>
        <th>Total</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="factura : ${facturas}">
        <td th:text="${factura.id}"></td>
        <td th:text="${factura.paciente != null ? factura.paciente.nombre : 'N/A'}"></td>
        <td th:text="${factura.descripcion}"></td>
        <td th:text="'$' + ${#numbers.formatDecimal(factura.costo, 1, 2)}"></td>
        <td>
            <a th:href="@{/facturas/{id}(id=${factura.id})}">
                <button>Ver Detalles</button>
            </a>
        </td>
    </tr>
</table>

</body>
</html>
