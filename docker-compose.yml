version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql-vet
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: vet-app
    restart: always
    ports:
      - "8080:8080"
    environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
        SPRING_PROFILES_ACTIVE: production
        DB_HOST: mysql
        DB_PORT: 3306
        DB_NAME: ${MYSQL_DATABASE}
        DB_USER: ${MYSQL_USER}
        DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - mysql
  apache:
    image: apache-proxy:latest
    build: ./docker/apache
    container_name: apache-vet
    restart: always
    ports:
      - "443:443"
    depends_on:
      - app